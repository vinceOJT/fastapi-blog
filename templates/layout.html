<!DOCTYPE html>
<html lang="en" class="h-full">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title> {% if title %}
        FastAPI Blog - {{ title }}
        {% else %}
        FastAPI Blog
        {% endif %}</title>
    <meta name="description" content="FastAPI Tutorial">
    <meta name="author" content="Corey Schafer">

    <meta property="og:title" content="FastAPI Blog">
    <meta property="og:type" content="website">
    <meta property="og:url" content="">
    <meta property="og:image" content="">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100..900&family=Nunito:wght@200..1000&display=swap"
        rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // This tells Tailwind to use the .dark class on the html tag
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        steel: '#527c9f', // This replaces your manual CSS .bg-steel
                    }
                }
            }
        }
    </script>

    <link rel="stylesheet" type="text/css" href="{{ url_for('static', path='/css/main.css') }}">

    <style type="text/css">
        /* Custom color for the "Steel" theme */
        .bg-steel {
            background-color: #527c9f;
        }

        body {
            font-family: 'Nunito', sans-serif;
        }

        h1,
        h2,
        h3 {
            font-family: 'Montserrat', sans-serif;
        }
    </style>

    <link rel="icon" href="{{ url_for('static', path='/icons/favicon.ico') }}" sizes="any">
    <link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', path='/icons/icon.png') }}">
    <link rel="manifest" href="{{ url_for('static', path='/site.webmanifest') }}">
</head>

<body
    class="flex flex-col min-h-screen bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 transition-colors duration-200">

    <header class="bg-steel sticky top-0 z-50 shadow-md">
        <nav class="container mx-auto px-4 py-3 flex flex-wrap items-center justify-between">
            <a class="text-xl font-bold text-white tracking-tight" href="{{ url_for('home') }}">FastAPI Blog</a>

            <button id="nav-toggle" class="md:hidden text-white focus:outline-none">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7">
                    </path>
                </svg>
            </button>

            <div id="nav-content" class="hidden w-full md:flex md:items-center md:w-auto mt-4 md:mt-0">
                <div class="flex flex-col md:flex-row md:ml-auto space-y-2 md:space-y-0 md:space-x-4 items-center">
                    <a class="text-white hover:text-gray-200" href="{{ url_for('home') }}">Home</a>
                    <div class="border-t border-blue-400 md:border-none w-full md:w-auto"></div>
                    <div id="loggedInNav" class="hidden">
                        <button
                            class="border border-white text-white px-4 py-2 rounded-md hover:bg-white hover:text-gray-900 transition-colors duration-200 mb-2 md:mb-0 md:mr-2"
                            type="button"
                            onclick="document.getElementById('createPostModal').classList.remove('hidden')">
                            New Post
                        </button>
                        <a class="bg-white text-blue-600 px-4 py-2 rounded-md hover:bg-gray-100 transition-colors duration-200 mb-2 md:mb-0 md:mr-3 inline-block"
                            href="{{ url_for('account_page') }}" id="accountBtn">
                            Account
                        </a>
                    </div>
                    <!-- Shown when logged out -->
                    <div id="loggedOutNav">
                        <a class="border border-white text-white px-4 py-2 rounded-md hover:bg-white hover:text-gray-900 transition-colors duration-200 mb-2 md:mb-0 md:mr-2 inline-block"
                            href="{{ url_for('login_page') }}">Login</a>
                        <a class="bg-white text-blue-600 px-4 py-2 rounded-md hover:bg-gray-100 transition-colors duration-200 mb-2 md:mb-0 md:mr-3 inline-block"
                            href="{{ url_for('register_page') }}">Register</a>
                    </div>

                    <button id="theme-toggle" class="p-2 rounded-full hover:bg-blue-500 text-white transition">
                        <span id="theme-toggle-icon">🌗</span>
                    </button>
                </div>
            </div>
        </nav>
    </header>

    <main class="container mx-auto px-4 flex-grow mt-8 mb-12">
        <div class="flex flex-col md:flex-row gap-8">

            <div class="md:w-2/3">
                {% block content %}
                {% endblock content %}
            </div>

            <aside class="md:w-1/3">
                <div
                    class="bg-white dark:bg-gray-800 p-6 rounded-lg shadow-sm border border-gray-200 dark:border-gray-700">
                    <h3 class="text-lg font-bold mb-4 border-b pb-2">Our Sidebar</h3>
                    <p class="text-gray-600 dark:text-gray-400 mb-4 text-sm">You can put any information here you'd
                        like.</p>
                    <ul class="space-y-2">
                        <li
                            class="p-3 bg-gray-50 dark:bg-gray-700 rounded border border-gray-100 dark:border-gray-600 hover:bg-gray-100 transition">
                            Latest Posts</li>
                        <li
                            class="p-3 bg-gray-50 dark:bg-gray-700 rounded border border-gray-100 dark:border-gray-600 hover:bg-gray-100 transition">
                            Announcements</li>
                        <li
                            class="p-3 bg-gray-50 dark:bg-gray-700 rounded border border-gray-100 dark:border-gray-600 hover:bg-gray-100 transition">
                            Calendars</li>
                    </ul>
                </div>
            </aside>

        </div>
    </main>

    <footer class="bg-white dark:bg-gray-800 border-t border-gray-200 dark:border-gray-700 py-6 mt-auto">
        <div class="container mx-auto px-4 text-center">
            <p class="text-gray-500 text-sm">
                © <span id="year"></span> Vex
            </p>
        </div>
    </footer>
    <div class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 hidden" id="createPostModal">
        <div class="bg-white dark:bg-gray-800 rounded-lg shadow-xl w-full max-w-lg mx-4">
            <div class="flex items-center justify-between px-6 py-4 border-b border-gray-200 dark:border-gray-700">
                <h5 class="text-lg font-semibold text-gray-900 dark:text-white">New Post</h5>
                <button type="button"
                    class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 text-xl leading-none"
                    onclick="document.getElementById('createPostModal').classList.add('hidden')"
                    aria-label="Close">&times;</button>
            </div>
            <form id="createPostForm">
                <div class="px-6 py-4 space-y-4">
                    <div>
                        <label for="title"
                            class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Title</label>
                        <input type="text"
                            class="w-full border border-gray-300 dark:border-gray-600 rounded-md px-3 py-2 text-sm bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500"
                            id="title" name="title" required>
                    </div>
                    <div>
                        <label for="content"
                            class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Content</label>
                        <textarea
                            class="w-full border border-gray-300 dark:border-gray-600 rounded-md px-3 py-2 text-sm bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500"
                            id="content" name="content" rows="5" required></textarea>
                    </div>
                </div>
                <div class="flex justify-end gap-2 px-6 py-4 border-t border-gray-200 dark:border-gray-700">
                    <button type="button"
                        class="px-4 py-2 text-sm rounded-md border border-gray-400 text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors"
                        onclick="document.getElementById('createPostModal').classList.add('hidden')">
                        Cancel
                    </button>
                    <button type="submit"
                        class="px-4 py-2 text-sm rounded-md bg-blue-600 text-white hover:bg-blue-700 transition-colors">
                        Post
                    </button>
                </div>
            </form>
        </div>
    </div>


    <!-- Success Modal -->
    <div class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 hidden" id="successModal">
        <div class="bg-white dark:bg-gray-800 rounded-lg shadow-xl w-full max-w-lg mx-4">
            <div
                class="flex items-center justify-between px-6 py-4 border-b border-gray-200 dark:border-gray-700 bg-green-600 rounded-t-lg">
                <h5 class="text-lg font-semibold text-white">Success</h5>
                <button type="button" class="text-white hover:text-green-200 text-xl leading-none"
                    onclick="document.getElementById('successModal').classList.add('hidden')"
                    aria-label="Close">&times;</button>
            </div>
            <div class="px-6 py-4">
                <p id="successMessage" class="text-base text-gray-800 dark:text-gray-200"></p>
            </div>
            <div class="flex justify-end px-6 py-4 border-t border-gray-200 dark:border-gray-700">
                <button type="button"
                    class="px-4 py-2 text-sm rounded-md bg-gray-500 text-white hover:bg-gray-600 transition-colors"
                    onclick="document.getElementById('successModal').classList.add('hidden')">
                    Close
                </button>
            </div>
        </div>
    </div>

    <!-- Error Modal -->
    <div class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 hidden" id="errorModal">
        <div class="bg-white dark:bg-gray-800 rounded-lg shadow-xl w-full max-w-lg mx-4">
            <div class="flex items-center justify-between px-6 py-4 bg-red-600 rounded-t-lg">
                <h5 class="text-lg font-semibold text-white">Error</h5>
                <button type="button" class="text-white hover:text-red-200 text-xl leading-none"
                    onclick="document.getElementById('errorModal').classList.add('hidden')"
                    aria-label="Close">&times;</button>
            </div>
            <div class="px-6 py-4">
                <p id="errorMessage" class="text-base text-gray-800 dark:text-gray-200"></p>
            </div>
            <div class="flex justify-end px-6 py-4 border-t border-gray-200 dark:border-gray-700">
                <button type="button"
                    class="px-4 py-2 text-sm rounded-md bg-gray-500 text-white hover:bg-gray-600 transition-colors"
                    onclick="document.getElementById('errorModal').classList.add('hidden')">
                    Close
                </button>
            </div>
        </div>
    </div>
    <script>
        // Set Year
        document.getElementById('year').textContent = new Date().getFullYear();

        // Mobile Menu Toggle
        const btn = document.getElementById('nav-toggle');
        const nav = document.getElementById('nav-content');
        btn.addEventListener('click', () => nav.classList.toggle('hidden'));

        // Dark Mode Logic
        const themeToggle = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-toggle-icon');

        const updateTheme = (theme) => {
            if (theme === 'dark' || (theme === 'auto' && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
                themeIcon.textContent = '🌚';
            } else {
                document.documentElement.classList.remove('dark');
                themeIcon.textContent = '🌝';
            }
        };

        themeToggle.addEventListener('click', () => {
            const isDark = document.documentElement.classList.contains('dark');
            const newTheme = isDark ? 'light' : 'dark';
            localStorage.setItem('theme', newTheme);
            updateTheme(newTheme);
        });

        // Initialize theme
        updateTheme(localStorage.getItem('theme') || 'auto');
    </script>

    <script type="module">
        import { getCurrentUser, logout } from '/static/js/auth.js';

        async function updateAuthUI() {
            const user = await getCurrentUser();
            const loggedInNav = document.getElementById('loggedInNav');
            const loggedOutNav = document.getElementById('loggedOutNav');

            if (user) {
                loggedInNav.classList.remove('hidden');
                loggedInNav.classList.add('flex');
                loggedOutNav.classList.add('hidden');
                document.getElementById('usernameDisplay').textContent = user.email;
            } else {
                loggedInNav.classList.add('hidden');
                loggedInNav.classList.remove('flex');
                loggedOutNav.classList.remove('hidden');
            }
        }

        document.getElementById('logoutBtn').addEventListener('click', logout);
        updateAuthUI();
    </script>







    <script type="module">
        import {
            getErrorMessage,
            hideModal,
            showModal,
        } from "/static/js/utils.js";

        const createForm = document.getElementById("createPostForm");

        createForm.addEventListener("submit", async (event) => {
            // Stop default form submission - we'll handle it with JavaScript
            event.preventDefault();

            // Gather form values into a plain object {title: "...", content: "..."}
            const formData = new FormData(createForm);
            const postData = Object.fromEntries(formData.entries());

            // TEMPORARY - hardcoded until authorization (Tutorial 11)
            postData.user_id = 1;

            try {
                // POST to our API as JSON
                const response = await fetch("/api/posts", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify(postData),
                });

                if (response.ok) {
                    const data = await response.json();
                    document.getElementById("successMessage").textContent =
                        `Post "${data.title}" created successfully!`;

                    hideModal("createPostModal");
                    showModal("successModal");
                    createForm.reset();

                    // BEFORE (broken) - listener added but reload never triggers reliably
                    // document.getElementById("successCloseBtn").addEventListener(
                    //     "click",
                    //     () => window.location.reload(),
                    //     { once: true }
                    // );

                    // AFTER - just reload immediately after a short delay so user sees the success message
                    setTimeout(() => {
                        hideModal("successModal");
                        window.location.reload();
                    }, 1500);
                } else {
                    const error = await response.json();
                    document.getElementById("errorMessage").textContent =
                        getErrorMessage(error);

                    hideModal("createPostModal");
                    showModal("errorModal");
                }
            } catch (error) {
                document.getElementById("errorMessage").textContent =
                    "Network error. Please check your connection and try again.";
                showModal("errorModal");
            }
        });
    </script>

    {% block scripts %}
    {% endblock scripts %}
</body>

</html>
