{% extends "layout.html" %}
{% block content %}
<div class="bg-white dark:bg-gray-800 rounded-lg shadow-sm border border-gray-200 dark:border-gray-700 py-6 px-8 mb-6">
    <h2 class="text-2xl font-bold text-gray-900 dark:text-white mb-6">Register</h2>
    <form id="registerForm" class="space-y-4">

        <div>
            <label for="username"
                class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Username</label>
            <input type="text"
                class="w-full border border-gray-300 dark:border-gray-600 rounded-md px-3 py-2 text-sm bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500"
                id="username" name="username" required minlength="1" maxlength="50">
        </div>

        <div>
            <label for="email" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Email</label>
            <input type="email"
                class="w-full border border-gray-300 dark:border-gray-600 rounded-md px-3 py-2 text-sm bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500"
                id="email" name="email" required>
        </div>

        <div>
            <label for="password"
                class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Password</label>
            <input type="password"
                class="w-full border border-gray-300 dark:border-gray-600 rounded-md px-3 py-2 text-sm bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500"
                id="password" name="password" required minlength="8">
            <p class="text-xs text-gray-500 dark:text-gray-400 mt-1">Must be at least 8 characters.</p>
        </div>

        <div>
            <label for="confirmPassword" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Confirm
                Password</label>
            <input type="password"
                class="w-full border border-gray-300 dark:border-gray-600 rounded-md px-3 py-2 text-sm bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500"
                id="confirmPassword" name="confirmPassword" required minlength="8">
            <p id="passwordError" class="hidden text-xs text-red-500 mt-1">Passwords do not match.</p>
        </div>

        <button type="submit"
            class="px-4 py-2 bg-blue-600 text-white text-sm rounded-md hover:bg-blue-700 transition-colors">
            Register
        </button>

    </form>
    <p class="mt-4 text-sm text-gray-600 dark:text-gray-400">
        Already have an account?
        <a class="text-blue-600 dark:text-blue-400 hover:underline" href="{{ url_for('login_page') }}">Login here</a>
    </p>
</div>
{% endblock content %}

{% block scripts %}
<script type="module">
    import { getErrorMessage, showModal } from '/static/js/utils.js';

    const registerForm = document.getElementById('registerForm');
    const passwordInput = document.getElementById('password');
    const confirmPasswordInput = document.getElementById('confirmPassword');
    const passwordError = document.getElementById('passwordError');

    confirmPasswordInput.addEventListener('input', () => {
        if (passwordInput.value !== confirmPasswordInput.value) {
            passwordError.classList.remove('hidden');
            confirmPasswordInput.setCustomValidity('Passwords do not match');
        } else {
            passwordError.classList.add('hidden');
            confirmPasswordInput.setCustomValidity('');
        }
    });

    registerForm.addEventListener('submit', async (event) => {
        event.preventDefault();

        if (passwordInput.value !== confirmPasswordInput.value) {
            passwordError.classList.remove('hidden');
            return;
        }

        const formData = new FormData(registerForm);
        const userData = {
            username: formData.get('username'),
            email: formData.get('email'),
            password: formData.get('password'),
        };

        try {
            const response = await fetch('/api/users', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(userData),
            });

            if (response.ok) {
                document.getElementById('successMessage').textContent =
                    'Account created successfully! Please login.';
                showModal('successModal');

                // Redirect to login after closing success modal
                document.getElementById('successModal')
                    .querySelector("button[onclick*='hidden']")
                    .addEventListener('click', () => {
                        window.location.href = '/login';
                    }, { once: true });
            } else {
                const error = await response.json();
                document.getElementById('errorMessage').textContent = getErrorMessage(error);
                showModal('errorModal');
            }
        } catch (error) {
            document.getElementById('errorMessage').textContent =
                'Network error. Please check your connection and try again.';
            showModal('errorModal');
        }
    });
</script>
{% endblock scripts %}
