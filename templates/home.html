{% extends "layout.html" %}
{% block content %}
{% for post in posts %}
<article
    class="bg-white dark:bg-gray-800 p-6 mb-6 rounded-lg shadow-sm border border-gray-200 dark:border-gray-700 transition-all hover:shadow-md">
    <div class="flex items-start gap-4">

        <img class="rounded-full flex-shrink-0 object-cover border border-gray-100 dark:border-gray-600"
            src="{{ post.author.image_path }}" alt="{{ post.author.username }}'s profile picture"
            width="64" height="64" loading="lazy">

        <div class="flex-grow">
            <div class="flex items-center gap-2 mb-1">
                <a class="font-bold text-blue-600 dark:text-blue-400 hover:underline" href="{{ url_for('user_post_page', user_id = post.author.id) }}">
                    {{ post.author.username }}
                </a>
                <span class="text-gray-300 dark:text-gray-600">|</span>
                <small class="text-sm text-gray-500 dark:text-gray-400">
                    {{ post.date_posted.strftime('%B %d, %Y') }}
                </small>
            </div>

            <h2 class="mb-2">
                <a class="text-2xl font-semibold text-gray-900 dark:text-white hover:text-blue-600 dark:hover:text-blue-400 transition-colors"
                    href="{{ url_for('post_page', post_id=post.id ) }}">
                    {{ post.title }}
                </a>
            </h2>

            <p class="text-gray-700 dark:text-gray-300 leading-relaxed">
                {{ post.content }}
            </p>
        </div>

    </div>
</article>
{% endfor %}
{% endblock content %}
