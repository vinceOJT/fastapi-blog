{% extends "layout.html" %}
{% block content %}
<div x-data="{ open: false }">
    <article class="bg-white dark:bg-gray-800 p-6 mb-6 rounded-lg shadow-sm border border-gray-200 dark:border-gray-700">
        <div class="flex items-start gap-4">
            <img class="rounded-full flex-shrink-0 object-cover border border-gray-100 dark:border-gray-600"
                 src="{{ post.author.image_path }}"
                 alt="{{ post.author.username }}'s profile picture"
                 width="64"
                 height="64"
                 loading="lazy">

            <div class="flex-grow">
                <div class="flex items-center gap-2 mb-2 text-sm">
                    <a class="font-bold text-blue-600 dark:text-blue-400 hover:underline" href="#">{{ post.author.username }}</a>
                    <span class="text-gray-400">/</span>
                    <span class="text-gray-500 dark:text-gray-400">{{ post.date_posted.strftime('%B %d, %Y')  }}</span>
                </div>

                <h2 class="text-3xl font-bold text-gray-900 dark:text-white mb-4">{{ post.title }}</h2>
                <p class="text-gray-700 dark:text-gray-300 leading-relaxed whitespace-pre-line">{{ post.content }}</p>

                <div class="mt-6 pt-6 border-t border-gray-100 dark:border-gray-700 flex flex-wrap gap-2">
                    <a class="px-4 py-2 border border-gray-300 dark:border-gray-600 text-gray-700 dark:text-gray-300 rounded hover:bg-gray-50 dark:hover:bg-gray-700 transition" 
                       href="#">
                       Edit Post
                    </a>
                    <button type="button" 
                            @click="open = true"
                            class="px-4 py-2 border border-red-500 text-red-500 rounded hover:bg-red-50 dark:hover:bg-red-900/20 transition">
                        Delete Post
                    </button>
                </div>
            </div>
        </div>
    </article>

    <div x-show="open" 
         class="fixed inset-0 z-[60] overflow-y-auto" 
         aria-labelledby="modal-title" role="dialog" aria-modal="true"
         style="display: none;">
        <div class="flex items-end justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">
            
            <div class="fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity" @click="open = false"></div>

            <div class="inline-block align-bottom bg-white dark:bg-gray-800 rounded-lg text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-lg sm:w-full">
                <div class="bg-white dark:bg-gray-800 px-4 pt-5 pb-4 sm:p-6 sm:pb-4">
                    <div class="sm:flex sm:items-start">
                        <div class="mx-auto flex-shrink-0 flex items-center justify-center h-12 w-12 rounded-full bg-red-100 dark:bg-red-900/30 sm:mx-0 sm:h-10 sm:w-10">
                            <svg class="h-6 w-6 text-red-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                            </svg>
                        </div>
                        <div class="mt-3 text-center sm:mt-0 sm:ml-4 sm:text-left">
                            <h3 class="text-lg leading-6 font-bold text-gray-900 dark:text-white" id="modal-title">Delete Post?</h3>
                            <div class="mt-2">
                                <p class="text-sm text-gray-500 dark:text-gray-400">Are you sure you want to delete this post? This action cannot be undone.</p>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="bg-gray-50 dark:bg-gray-700/50 px-4 py-3 sm:px-6 sm:flex sm:flex-row-reverse">
                    <form action="#" method="POST">
                        <button type="submit" class="w-full inline-flex justify-center rounded-md border border-transparent shadow-sm px-4 py-2 bg-red-600 text-base font-medium text-white hover:bg-red-700 focus:outline-none sm:ml-3 sm:w-auto sm:text-sm transition">
                            Delete
                        </button>
                    </form>
                    <button type="button" 
                            @click="open = false"
                            class="mt-3 w-full inline-flex justify-center rounded-md border border-gray-300 dark:border-gray-600 shadow-sm px-4 py-2 bg-white dark:bg-gray-800 text-base font-medium text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700 focus:outline-none sm:mt-0 sm:ml-3 sm:w-auto sm:text-sm transition">
                        Cancel
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // If you don't want to use Alpine.js, you can use this simple toggle:
    const deleteBtn = document.querySelector('[data-delete-trigger]');
    // Logic to toggle the 'hidden' class on your modal div
</script>
{% endblock content %}
